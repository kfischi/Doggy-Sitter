<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מיקה - דוגיסיטר בגבעת חיים</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            overflow: hidden;
            text-align: center;
            border: 4px solid #fff;
        }
        .banner-img {
            width: 100%;
            height: auto;
            display: block;
        }
        .content {
            padding: 25px;
            background: linear-gradient(180deg, #fff 0%, #f9f9f9 100%);
        }
        h1 {
            color: #2c3e50;
            margin: 0 0 10px;
            font-size: 24px;
        }
        p {
            color: #555;
            font-size: 18px;
            line-height: 1.5;
            margin: 0 0 20px;
        }
        .price-tag {
            background: #e1f5fe;
            color: #0288d1;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            margin-bottom: 25px;
            font-size: 20px;
            border: 2px dashed #0288d1;
        }
        .whatsapp-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }
        .whatsapp-btn:hover {
            background-color: #1ebe57;
            transform: scale(1.02);
        }
        .whatsapp-btn img {
            width: 25px;
            margin-left: 10px;
        }
        .footer {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="https://the-artists.co.il/wp-content/uploads/2024/02/mika-dogs.jpg" alt="מיקה דוגיסיטר" class="banner-img">
    
    <div class="content">
        <h1>מחפשים דוגיסיטר לכלב?</h1>
        <p>היי, אני מיקה! אשמח להוציא את הכלב שלכם לטיול מהנה, אחראי ומלא באהבה ברחבי הקיבוץ.</p>
        
        <div class="price-tag">45 ש"ח לטיול</div>

        <a href="https://wa.me/972527568854?text=%D7%9ה%D7%99%D7%99%20%D7%9E%D7%99%D7%A7%D7%94%2C%20%D7%A0%D7%A9%D7%9E%D7%97%20%D7%9C%D7%AA%D7%90%D7%9D%20%D7%94%D7%95%D7%92%D7%99%D7%A1%D7%99%D7%98%D7%A8" class="whatsapp-btn">
            שלחו לי הודעה בוואטסאפ
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
        </a>
        
        <div class="footer">גבעת חיים איחוד | 052-7568854</div>
    </div>
</div>

</body>
</html>
